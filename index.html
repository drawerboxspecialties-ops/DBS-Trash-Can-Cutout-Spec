<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Pullout trash can cutout spec — box layout and CNC cutout dimensions for shop floor.">
    <title>Cutout Spec — Pullout Trash Can</title>
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
<div class="page">

    <div class="header-banner">
        <div>
            <h1>Pullout Trash Can — Cutout Spec</h1>
            <p>Box layout &amp; cutout dimensions for shop floor</p>
        </div>
    </div>

    <div class="layout">

        <div class="card" id="inputsCard">
            <h2 class="card-title">Inputs</h2>

            <div class="input-section">
                <p class="input-section__label">Can</p>
                <div class="field">
                    <label for="canModel">Model</label>
                    <select id="canModel"></select>
                </div>
                <div class="field">
                    <label>Quantity</label>
                    <div class="seg" id="qtySeg">
                        <button type="button" data-qty="1" class="active">Single</button>
                        <button type="button" data-qty="2">Double</button>
                    </div>
                </div>
                <div class="field">
                    <label>Orientation</label>
                    <div class="seg" id="rotSeg">
                        <button type="button" data-rot="0">Standard</button>
                        <button type="button" data-rot="1" class="active">Rotated 90&deg;</button>
                    </div>
                </div>
                <div class="field field--check">
                    <label class="check-row" for="includeCansOrder">
                        <input type="checkbox" id="includeCansOrder" />
                        <span>Include cans with order</span>
                    </label>
                </div>
                <div class="field" id="orderCanQtyWrap" hidden>
                    <label for="orderCanQty">How many cans</label>
                    <input type="number" id="orderCanQty" class="input-dim" min="1" step="1" value="1" />
                </div>
            </div>

            <div class="input-section">
                <p class="input-section__label">Box</p>
                <div class="field">
                    <label for="sideMaterial">Material</label>
                    <select id="sideMaterial"></select>
                </div>
                <div class="dim-fields">
                    <div class="field">
                        <label for="cabWidth">Width</label>
                        <div class="input-unit input-dim"><input type="number" id="cabWidth" min="0" step="0.125" value="11.375"></div>
                        <div class="field-error" id="cabWidthErr" hidden></div>
                    </div>
                    <div class="field">
                        <label for="cabDepth">Depth</label>
                        <div class="input-unit input-dim"><input type="number" id="cabDepth" min="0" step="0.125" value="21"></div>
                        <div class="field-error" id="cabDepthErr" hidden></div>
                    </div>
                    <div class="field">
                        <label for="cabHeight">Height</label>
                        <div class="input-unit input-dim"><input type="number" id="cabHeight" min="0" step="0.125" value=""></div>
                        <p class="field-note">Print only</p>
                    </div>
                </div>
            </div>

            <div class="input-actions">
                <button type="button" class="btn-reset" id="resetAllBtn">Reset all</button>
            </div>
        </div>
        <div class="results" id="results"></div>

    </div>
</div>
<div class="print-sheet" id="printSheet" aria-hidden="true"></div>

<script src="js/cutoutSpec.js"></script>
<script src="js/format.js"></script>
<script src="js/state.js"></script>
<script src="js/diagram.js"></script>
<script src="js/print.js"></script>
<script src="js/app.js"></script>
</body>
</html>
